services:
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: regncon-image
    # tty required by air when using compose
    tty: true
    ports:
      - 8080:8080
    volumes:
      - type: bind
        source: ./
        target: /home/devuser/app
        read_only: false
    command: go tool task start
