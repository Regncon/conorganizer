version: "3"

dotenv:
    - ".env"

tasks:
    # The `build:` tasks below are used together for "production" builds of your project
    build:templ:
        cmds:
            - |
              set -eu
              for dir in components pages layouts service; do
                if [ -d "$dir" ]; then
                  go tool templ generate -path "$dir" -log-level error
                fi
              done

    build:
        cmds:
            - go build -o bin/main .
        deps:
            - build:templ
        #parallel: true

        # Use this task to debug your project with the delve debugger
    debug:
        cmds:
            - go tool dlv exec ./bin/main
        deps:
            - build

    # The `start:` tasks below are used together for "dev" builds, and will hot-reload your entire project when there are code changes
    start:templ:
        cmds:
            - |
              set -eu
              mkdir -p tmp
              stamp="tmp/templ-watch.stamp"

              touch "$stamp"

              while true; do
                sleep 0.5
                changed="$(
                  find components pages layouts service \
                    -type f \
                    -name '*.templ' \
                    -newer "$stamp" \
                    2>/dev/null \
                    | sort
                )"

                if [ -z "$changed" ]; then
                  continue
                fi

                printf '%s\n' "$changed" | while IFS= read -r file; do
                  if [ -n "$file" ]; then
                    echo "templ: generating $file"
                    go tool templ generate -f "$file" -log-level error
                  fi
                done

                touch "$stamp"
              done

    start:server:
        cmds:
            - |
              set -eu
              for dir in components pages layouts service; do
                if [ -d "$dir" ]; then
                  go tool templ generate -path "$dir" -log-level error
                fi
              done

              go tool air \
              --build.cmd "go build -buildvcs=false -tags dev -o tmp/bin/main" \
              --build.bin "tmp/bin/main" \
              --build.delay "1000" \
              --build.exclude_dir ".git,.jj,tmp,vendor,testdata,database,hetzner,local-event-images,configuration-as-code,deploy,documentation,migrations,plans,testutil,.gocache" \
              --build.include_ext "go,js,css,html,svg,webp,ico,png,jpg,jpeg,avif" \
              --build.include_file ".env" \
              --build.poll "true" \
              --build.poll_interval "500" \
              --build.stop_on_error "false" \
              --proxy.enabled "true" \
              --proxy.app_port "8080" \
              --proxy.proxy_port "7331" \
              --proxy.app_start_timeout "10000" \
              --misc.clean_on_exit true

    start:
        deps:
            - start:templ
            - start:server

    # Similar to above task, but recolors log levels
    start:logcolors:
        cmds:
            - |
              go tool task start 2>&1 | sed -E \
              -e 's/(ERROR)/\x1b[31;1m\1\x1b[0m/g' \
              -e 's/(WARN)/\x1b[33;1m\1\x1b[0m/g' \
              -e 's/(DEBUG)/\x1b[32;1m\1\x1b[0m/g'

    # Start development server
    dev:
        cmds:
            - air -c .air.toml

    # Run current build
    run:
        cmds:
            - ./bin/main
        deps:
            - build

    # Run all tests in all subdirectories
    test:
        cmds:
            - sqlite3 database/events.db ".schema --indent --nosys" > schema.sql
            - go test ./...

    # Download local copies of production assets
    download:
        deps:
            - download:db
            - download:images

    download:db:
        # Download a local copy of the production database
        # Requires DB_SSH_USER in .env or shell environment
        cmds:
            - |
              set -eu
              : "${DB_SSH_USER:?Set DB_SSH_USER in .env}"
              mkdir -p database
              scp -P 22 "${DB_SSH_USER}@46.62.159.49:/mnt/HC_Volume_103911252/backups/sqlite/events-latest.db" "database/events.db.download"
              mv "database/events.db.download" "database/events.db"

    # Download local copies of production event images
    download:images:
        cmds:
            # Create local-event-images directory if it doesn't exist
            - mkdir -p ./local-event-images
            ## Download all event images from https://program.regncon.no/event-images/ and save them to ./local-event-images
            - wget -r -np -nH -N -R html,tmp --cut-dirs=1 -P
              ./local-event-images
              https://main.lekeplassen.regncon.no/event-images/

    # Kill all running air, templ and taks processes
    kill:
        cmds:
            - killall -q main
            - killall -q templ
            - killall -q air
            - killall -q task
