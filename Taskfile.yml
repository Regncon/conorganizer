version: "3"

dotenv:
    - ".env"

env:
    STATIC_DIR: "static"

tasks:
    # The `build:` tasks below are used together for "production" builds of your project
    build:templ:
        cmds:
            - |
              set -eu
              for dir in components pages layouts service; do
                if [ -d "$dir" ]; then
                  go tool templ generate -path "$dir" -log-level error
                fi
              done

    build:
        cmds:
            - go build -o bin/main .
        deps:
            - build:templ
        #parallel: true

        # Use this task to debug your project with the delve debugger
    debug:
        cmds:
            - go tool dlv exec ./bin/main
        deps:
            - build

    # The `start:` tasks below are used together for "dev" builds, and will hot-reload your entire project when there are code changes
    start:templ:
        cmds:
            - |
              set -eu
              mkdir -p tmp/templ-watch
              lock_dir="tmp/templ-watch/generating.lock"
              rmdir "$lock_dir" 2>/dev/null || true

              hash_templates() {
                find "$1" -type f -name '*.templ' -exec sha256sum {} + 2>/dev/null \
                  | sort \
                  | sha256sum \
                  | cut -d ' ' -f 1
              }

              generate_dirs() {
                if [ "$#" -eq 0 ]; then
                  return
                fi

                while ! mkdir "$lock_dir" 2>/dev/null; do
                  sleep 0.1
                done

                for dir in "$@"; do
                  if [ ! -d "$dir" ]; then
                    continue
                  fi

                  echo "templ: generating $dir"
                  if ! go tool templ generate -path "$dir" -log-level error; then
                    echo "templ: generation failed for $dir" >&2
                  fi
                  hash_templates "$dir" > "tmp/templ-watch/$dir.sha256"
                done

                rmdir "$lock_dir"
              }

              generate_dirs components pages layouts service

              while true; do
                changed_dirs=""
                for dir in components pages layouts service; do
                  if [ ! -d "$dir" ]; then
                    continue
                  fi

                  state="tmp/templ-watch/$dir.sha256"
                  current_hash="$(hash_templates "$dir")"
                  previous_hash="$(cat "$state" 2>/dev/null || true)"

                  if [ "$current_hash" != "$previous_hash" ]; then
                    changed_dirs="$changed_dirs $dir"
                  fi
                done

                if [ -n "$changed_dirs" ]; then
                  generate_dirs $changed_dirs
                fi

                sleep 0.5
              done

    start:server:
        vars:
            APP_DB_PATH: '{{.APP_DB_PATH | default "database/events.db"}}'
            APP_IMAGE_PATH: '{{.APP_IMAGE_PATH | default "local-event-images"}}'
        cmds:
            - |
              set -eu
              app_db_path="{{.APP_DB_PATH}}"
              app_image_path="{{.APP_IMAGE_PATH}}"
              build_cmd='set -eu; while [ -d tmp/templ-watch/generating.lock ]; do sleep 0.1; done; mkdir -p tmp/bin; out="tmp/bin/main.$$"; go build -buildvcs=false -tags dev -o "$out" .; mv "$out" tmp/bin/main'

              go tool air \
              --build.cmd "$build_cmd" \
              --build.bin "tmp/bin/main" \
              --build.args_bin "-dbp $app_db_path -image-path $app_image_path" \
              --build.delay "1500" \
              --build.exclude_dir ".git,.jj,tmp,vendor,testdata,database,hetzner,local-event-images,configuration-as-code,deploy,documentation,migrations,plans,testutil,.gocache" \
              --build.include_ext "go" \
              --build.include_file ".env" \
              --build.poll "true" \
              --build.poll_interval "500" \
              --build.stop_on_error "false" \
              --proxy.enabled "false" \
              --misc.clean_on_exit true

    start:reload:
        cmds:
            - |
              go tool air \
              --build.cmd "curl -fsS http://localhost:8080/hotreload >/dev/null || true" \
              --build.bin "true" \
              --build.delay "200" \
              --build.exclude_dir ".git,.jj,tmp,vendor,testdata,database,hetzner,local-event-images,configuration-as-code,deploy,documentation,migrations,plans,testutil,.gocache" \
              --build.include_dir "$STATIC_DIR" \
              --build.include_ext "js,css,html,svg,webp,ico,png,jpg,jpeg,avif" \
              --build.poll "true" \
              --build.poll_interval "500" \
              --build.stop_on_error "false" \
              --proxy.enabled "false" \
              --misc.clean_on_exit true

    start:
        deps:
            - start:templ
            - start:reload
            - start:server

    start:demo:
        deps:
            - start:templ
            - start:reload
            - task: start:server
              vars:
                  APP_DB_PATH: database/events-demo.db

    start:logcolors:
        cmds:
            - |
              go tool task start 2>&1 | sed -E \
              -e 's/(ERROR)/\x1b[31;1m\1\x1b[0m/g' \
              -e 's/(WARN)/\x1b[33;1m\1\x1b[0m/g' \
              -e 's/(DEBUG)/\x1b[32;1m\1\x1b[0m/g'

    # Start development server
    dev:
        cmds:
            - air -c .air.toml

    # Run current build
    run:
        cmds:
            - ./bin/main
        deps:
            - build

    # Run all tests in all subdirectories
    test:
        cmds:
            - sqlite3 database/events.db ".schema --indent --nosys" > schema.sql
            - go test ./...

    # Run tests and print the BDD behavior report used in CI logs
    test:report:
        cmds:
            - go run ./cmd/testreport

    # Download local copies of remote assets
    download:
        cmds:
            - |
              echo "Specify an environment:"
              echo "  go tool task download:main"
              echo "  go tool task download:demo"
              exit 1

    download:main:
        cmds:
            - ./scripts/download-environment main all

    download:main:db:
        cmds:
            - ./scripts/download-environment main db

    download:main:images:
        cmds:
            - ./scripts/download-environment main images

    download:demo:
        cmds:
            - ./scripts/download-environment demo all

    download:demo:db:
        cmds:
            - ./scripts/download-environment demo db

    download:demo:images:
        cmds:
            - ./scripts/download-environment demo images

    # Kill all running air, templ and taks processes
    kill:
        cmds:
            - killall -q main
            - killall -q templ
            - killall -q air
            - killall -q task
