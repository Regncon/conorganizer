version: "3"

dotenv:
    - ".env"

env:
    STATIC_DIR: "static"

tasks:
    # The `build:` tasks below are used together for "production" builds of your project
    build:templ:
        cmds:
            - go tool templ generate

    build:
        cmds:
            - go build -o bin/main .
        deps:
            - build:templ
        #parallel: true

        # Use this task to debug your project with the delve debugger
    debug:
        cmds:
            - go tool dlv exec ./bin/main
        deps:
            - build

    # The `start:` tasks below are used together for "dev" builds, and will hot-reload your entire project when there are code changes
    start:templ:
        cmds:
            - go tool templ generate --watch --proxybind="0.0.0.0"
              --proxy="http://localhost:8080" --open-browser=false -v

    start:server:
        cmds:
            - |
              go tool air \
              --build.cmd "go build -tags dev -o tmp/bin/main" \
              --build.bin "tmp/bin/main" \
              --build.delay "20" \
              --build.include_ext "go" \
              --build.stop_on_error "false" \
              --misc.clean_on_exit true

    start:reload:
        cmds:
            - |
              go tool air \
              --build.cmd "go tool templ generate --notify-proxy" \
              --build.bin "true" \
              --build.delay "100" \
              --build.exclude_dir "" \
              --build.include_dir "$STATIC_DIR" \
              --build.include_ext "js,css,env"

    start:
        deps:
            - start:templ
            - start:reload
            - start:server

    # Similar to above task, but recolors log levels
    start:logcolors:
        cmds:
            - |
              go tool task start 2>&1 | sed -E \
              -e 's/(ERROR)/\x1b[31;1m\1\x1b[0m/g' \
              -e 's/(WARN)/\x1b[33;1m\1\x1b[0m/g' \
              -e 's/(DEBUG)/\x1b[32;1m\1\x1b[0m/g'

    # Start development server
    dev:
        cmds:
            - air -c .air.toml

    # Run current build
    run:
        cmds:
            - ./bin/main
        deps:
            - build

    # Run all tests in all subdirectories
    test:
        cmds:
            - sqlite3 database/events.db ".schema --indent --nosys" > schema.sql
            - go test ./...

    # Run tests and print the BDD behavior report used in CI logs
    test:report:
        cmds:
            - go run ./cmd/testreport

    # Download local copies of production assets
    download:
        deps:
            - download:db
            - download:images

    download:db:
        # Download a local copy of the production database
        # Requires DB_SSH_USER in .env or shell environment
        cmds:
            - |
              set -eu
              : "${DB_SSH_USER:?Set DB_SSH_USER in .env}"
              mkdir -p database
              scp -P 22 "${DB_SSH_USER}@46.62.159.49:/mnt/HC_Volume_103911252/backups/sqlite/events-latest.db" "database/events.db.download"
              mv "database/events.db.download" "database/events.db"

    # Download local copies of production event images
    download:images:
        cmds:
            # Create local-event-images directory if it doesn't exist
            - mkdir -p ./local-event-images
            ## Download all event images from https://program.regncon.no/event-images/ and save them to ./local-event-images
            - wget -r -np -nH -N -R html,tmp --cut-dirs=1 -P
              ./local-event-images
              https://main.lekeplassen.regncon.no/event-images/

    # Kill all running air, templ and taks processes
    kill:
        cmds:
            - killall -q main
            - killall -q templ
            - killall -q air
            - killall -q task
