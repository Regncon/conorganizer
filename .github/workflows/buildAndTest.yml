name: CI/CD Pipeline

on:
    push:
        branches:
            - main

    pull_request:
        branches: ["**"]
        types: [opened, reopened, synchronize, ready_for_review, closed]

# Serialize runs per ref so rapid pushes to a PR (or main) never race on the
# same binary/service during deploy. cancel-in-progress is intentionally false:
# a running deploy is never interrupted mid mv/restart (which could leave the
# service on a missing binary). GitHub keeps only the newest pending run, so the
# latest commit always deploys last.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    build:
        # Nothing to build when a PR is merely closed (cleanup-preview handles that).
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26"
                  cache: true

            - name: Generate template files (templ via go.mod tool)
              run: go tool templ generate

            - name: Run tests with behavior report
              run: go run ./cmd/testreport

            - name: Build binary
              run: go build -o conorganizer

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: conorganizer
                  path: conorganizer

    deploy-fixed:
        needs: build
        # Pushes to main deploy the same binary to the fixed main and demo
        # services. Their systemd units and Caddy routes are managed by
        # configuration-as-code, not generated by CI.
        if: github.event_name == 'push' && github.ref_name == 'main'
        runs-on: ubuntu-latest
        environment:
            name: Production

        strategy:
            fail-fast: false
            matrix:
                safe_name: [main, demo]

        steps:
            - name: Checkout repo (for deploy files)
              uses: actions/checkout@v4

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: conorganizer
                  path: artifacts

            - name: Prepare fixed deploy bundle
              run: |
                  set -euo pipefail

                  mkdir -p deploy_bundle
                  cp artifacts/conorganizer deploy_bundle/conorganizer.new
                  cp deploy/deploy.sh deploy_bundle/deploy.sh

                  ls -l deploy_bundle

            - name: Check that HETZNER_SSH_KEY is set
              run: |
                  if [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
                    echo "HETZNER_SSH_KEY is empty or not available in this context" >&2
                    exit 1
                  fi
                  echo "HETZNER_SSH_KEY is set (value is masked in logs)."

            - name: Upload fixed deploy bundle to Hetzner
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  source: "deploy_bundle"
                  target: "/opt/conorganizer/${{ matrix.safe_name }}"
                  strip_components: 1

            - name: Promote binary and restart fixed service
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  script_stop: true
                  script: |
                      set -euo pipefail
                      SAFE_NAME="${{ matrix.safe_name }}"
                      APP_DIR="/opt/conorganizer/$SAFE_NAME"

                      echo "SAFE_NAME=$SAFE_NAME"
                      echo "APP_DIR=$APP_DIR"

                      echo "Making deploy.sh executable"
                      sudo chmod +x "$APP_DIR/deploy.sh"

                      echo "Running deploy script with SAFE_NAME argument"
                      sudo "$APP_DIR/deploy.sh" "$SAFE_NAME"

            - name: Echo fixed deployment URL
              run: |
                  SAFE_NAME="${{ matrix.safe_name }}"

                  echo ""
                  echo "=========================================="
                  echo "🚀 Deployment completed!"
                  echo "🔗 URL: https://$SAFE_NAME.lekeplassen.regncon.no"
                  echo "=========================================="
                  echo ""

    deploy:
        needs: build
        # Deploy a preview only for same-repo, non-draft, not-closed PRs. Forks
        # have no secrets, and drafts get no preview until marked ready (which
        # fires ready_for_review). Main/demo fixed deploys are handled by
        # deploy-fixed above.
        if: >
            github.event_name == 'pull_request' &&
            github.event.action != 'closed' &&
            github.event.pull_request.draft == false &&
            github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        environment:
            name: Production

        env:
            BRANCH_NAME: ${{ github.ref_name }}

        steps:
            - name: Compute instance info
              id: instance
              run: |
                  set -euo pipefail
                  BRANCH="${BRANCH_NAME}"

                  SAFE_NAME=$(echo "$BRANCH" | tr '/_' '-' | tr '[:upper:]' '[:lower:]')

                  BASE_PORT=18000
                  HASH=$(printf '%s' "$SAFE_NAME" | cksum | awk '{print $1}')
                  PORT=$((BASE_PORT + HASH % 1000))

                  HOST="${SAFE_NAME}.lekeplassen.regncon.no"

                  echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
                  echo "port=$PORT" >> "$GITHUB_OUTPUT"
                  echo "host=$HOST" >> "$GITHUB_OUTPUT"

            - name: Checkout repo (for deploy files)
              uses: actions/checkout@v4

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: conorganizer
                  path: artifacts

            - name: Prepare deploy bundle
              run: |
                  set -euo pipefail
                  SAFE_NAME="${{ steps.instance.outputs.safe_name }}"
                  PORT="${{ steps.instance.outputs.port }}"

                  mkdir -p deploy_bundle

                  cp artifacts/conorganizer deploy_bundle/conorganizer.new

                  sed \
                    -e "s/%SAFE_NAME%/$SAFE_NAME/g" \
                    -e "s/%PORT%/$PORT/g" \
                    deploy/conorganizer.service.tmpl \
                    > deploy_bundle/conorganizer-${SAFE_NAME}.service

                  cp deploy/deploy.sh deploy_bundle/deploy.sh

                  sed \
                    -e "s/%HOST%/${{ steps.instance.outputs.host }}/g" \
                    -e "s/%PORT%/$PORT/g" \
                    deploy/caddy-site.tmpl \
                    > deploy_bundle/caddy-${SAFE_NAME}.caddy

                  ls -l deploy_bundle

            - name: Check that HETZNER_SSH_KEY is set
              run: |
                  if [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
                    echo "HETZNER_SSH_KEY is empty or not available in this context" >&2
                    exit 1
                  fi
                  echo "HETZNER_SSH_KEY is set (value is masked in logs)."

            - name: Upload bundle to Hetzner
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  source: "deploy_bundle"
                  target: "/opt/conorganizer/${{ steps.instance.outputs.safe_name }}"
                  strip_components: 1

            - name: Install service, Caddy site, and run deploy script on Hetzner
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  script_stop: true
                  script: |
                      set -euo pipefail
                      SAFE_NAME="${{ steps.instance.outputs.safe_name }}"
                      APP_DIR="/opt/conorganizer/$SAFE_NAME"

                      echo "SAFE_NAME=$SAFE_NAME"
                      echo "APP_DIR=$APP_DIR"

                      echo "Making deploy.sh executable"
                      sudo chmod +x "$APP_DIR/deploy.sh"

                      echo "Running deploy script with SAFE_NAME argument"
                      sudo "$APP_DIR/deploy.sh" "$SAFE_NAME"

            - name: Echo deployment URL
              run: |
                  BRANCH="${{ github.ref_name }}"
                  SAFE_NAME=$(echo "$BRANCH" | tr '/_' '-' | tr '[:upper:]' '[:lower:]')

                  if [ "$SAFE_NAME" = "main" ]; then
                    HOST="main.lekeplassen.regncon.no"
                  else
                    HOST="${SAFE_NAME}.lekeplassen.regncon.no"
                  fi

                  echo ""
                  echo "=========================================="
                  echo "🚀 Deployment completed!"
                  echo "🔗 URL: https://$HOST"
                  echo "=========================================="
                  echo ""
            - name: Update PR with deployment URL
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v8
              with:
                  script: |
                      const host = '${{ steps.instance.outputs.host }}'
                      const deploymentUrlBlock = [
                        '<!-- preview-deployment-url:start -->',
                        '## Preview deployment',
                        '',
                        '_Added automatically by CI_',
                        '',
                        `🔗 https://${host}`,
                        '<!-- preview-deployment-url:end -->'
                      ].join('\n')

                      const { data: pullRequest } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.issue.number
                      })

                      const currentBody = pullRequest.body ?? ''
                      const marker = '<!-- preview-deployment-url:start -->'
                      const alreadyHasPreviewBlock = currentBody.includes(marker)
                      const prBodyIsEmpty = currentBody === ''

                      if (!alreadyHasPreviewBlock) {
                        const updatedBody = prBodyIsEmpty
                          ? deploymentUrlBlock
                          : `${currentBody}\n\n${deploymentUrlBlock}`

                        await github.rest.pulls.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.issue.number,
                        body: updatedBody
                        })
                      }

    cleanup-preview:
        # Tear down a preview environment when its PR closes (merged or not).
        # Same-repo only; forks never created a preview.
        if: >
            github.event_name == 'pull_request' &&
            github.event.action == 'closed' &&
            github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest

        steps:
            - name: Compute instance info
              id: instance
              run: |
                  set -euo pipefail
                  BRANCH="${{ github.ref_name }}"

                  SAFE_NAME=$(echo "$BRANCH" | tr '/_' '-' | tr '[:upper:]' '[:lower:]')

                  if [ "$SAFE_NAME" = "main" ]; then
                    echo "Refusing to clean up SAFE_NAME=main" >&2
                    exit 1
                  fi

                  echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"

            - name: Checkout repo (for cleanup script)
              uses: actions/checkout@v4

            - name: Check that HETZNER_SSH_KEY is set
              run: |
                  if [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
                    echo "HETZNER_SSH_KEY is empty or not available in this context" >&2
                    exit 1
                  fi
                  echo "HETZNER_SSH_KEY is set (value is masked in logs)."

            - name: Upload cleanup script to Hetzner
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  source: "deploy/cleanup.sh"
                  target: "/opt/conorganizer/${{ steps.instance.outputs.safe_name }}"
                  strip_components: 1

            - name: Run cleanup script on Hetzner
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USER }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: 22
                  script_stop: true
                  script: |
                      set -euo pipefail
                      SAFE_NAME="${{ steps.instance.outputs.safe_name }}"
                      APP_DIR="/opt/conorganizer/$SAFE_NAME"

                      echo "Cleaning up preview SAFE_NAME=$SAFE_NAME"
                      sudo chmod +x "$APP_DIR/cleanup.sh"
                      sudo "$APP_DIR/cleanup.sh" "$SAFE_NAME"
